name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Scaffolding lives in the org-shared reusable workflow; the review
  # instructions live in REVIEW.md at the repo root. Defaults (ubuntu-latest,
  # collaborators-only) match this repo's previous behavior.
  review:
    uses: plonklabs/.github/.github/workflows/claude-review.yml@main
    secrets: inherit
