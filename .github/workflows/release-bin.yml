name: Build flatbed binary

# Publishes the `flatbed` codegen helper as a standalone binary in a
# GitHub Release. Two trigger paths:
#
#   - push a `flatbed-vX.Y.Z` tag → cuts a versioned release with the
#     linux + darwin (amd64 + arm64 each) binaries and their sha256
#     checksums attached.
#   - run via `workflow_dispatch` → publishes a pre-release tagged
#     `flatbed-dev-<short-sha>` so a feature branch can hand someone
#     a binary without minting a real version. Pre-release flag is
#     set so dispatch builds don't appear as the "latest" versioned
#     release that automated consumers key off.
#
# Cross-platform is done by matrix on GitHub-hosted native runners. No
# cross toolchain involved — each runner builds its own OS/arch.

on:
  push:
    tags: ['flatbed-v*']
  workflow_dispatch:

concurrency:
  group: build-flatbed-bin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: macos-13
            os: darwin
            arch: amd64
          - runner: macos-14
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build flatbed binary
        run: cargo build -p flatbed_build --bin flatbed --release --locked

      - name: Stage binary + checksum
        # macOS runners have `shasum` but not GNU `sha256sum`; Linux has
        # both. Prefer `sha256sum` and fall back so the same step works
        # on every runner.
        run: |
          bin="flatbed-${{ matrix.os }}-${{ matrix.arch }}"
          install -m 0755 target/release/flatbed "$bin"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$bin" > "$bin.sha256"
          else
            shasum -a 256 "$bin" > "$bin.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatbed-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            flatbed-${{ matrix.os }}-${{ matrix.arch }}
            flatbed-${{ matrix.os }}-${{ matrix.arch }}.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release tag + prerelease flag
        id: tag
        # Untrusted context values (anyone with write access can push
        # a tag whose name contains shell metacharacters) flow through
        # `env:` rather than `${{ … }}` inside `run:`. The shell sees
        # them as data, not as part of the script.
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=flatbed-dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release notes
        # Quoted heredoc keeps every backtick / code-fence / `${OS}`
        # reference verbatim — no need to escape each one. The release
        # tag is then inserted by a `sed` pass against a sentinel token
        # so the shell never has to expand inside the markdown body.
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          cat > notes.md <<'EOF'
          Standalone build of the `flatbed` FlatBuffer codegen helper.

          Binaries (each with a matching `.sha256` checksum):
          - `flatbed-linux-amd64`
          - `flatbed-linux-arm64`
          - `flatbed-darwin-amd64`
          - `flatbed-darwin-arm64`

          Verify and install (Linux or macOS):

          ```bash
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m); case "$ARCH" in x86_64) ARCH=amd64 ;; aarch64|arm64) ARCH=arm64 ;; esac
          BASE="https://github.com/plonklabs/flatbed/releases/download/__RELEASE_TAG__"
          curl -fLO "$BASE/flatbed-${OS}-${ARCH}"
          curl -fLO "$BASE/flatbed-${OS}-${ARCH}.sha256"
          command -v sha256sum >/dev/null 2>&1 \
            && sha256sum -c "flatbed-${OS}-${ARCH}.sha256" \
            || shasum -a 256 -c "flatbed-${OS}-${ARCH}.sha256"
          install -m 0755 "flatbed-${OS}-${ARCH}" /usr/local/bin/flatbed
          ```
          EOF
          sed -i "s|__RELEASE_TAG__|$RELEASE_TAG|g" notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          IS_PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file notes.md \
            $PRERELEASE_FLAG \
            dist/flatbed-linux-amd64 \
            dist/flatbed-linux-amd64.sha256 \
            dist/flatbed-linux-arm64 \
            dist/flatbed-linux-arm64.sha256 \
            dist/flatbed-darwin-amd64 \
            dist/flatbed-darwin-amd64.sha256 \
            dist/flatbed-darwin-arm64 \
            dist/flatbed-darwin-arm64.sha256

  notify-failure:
    needs: [build, release]
    if: failure()
    uses: plonklabs/.github/.github/workflows/discord-notify-failure.yml@main
    with:
      workflow_name: Build flatbed binary
    secrets: inherit
