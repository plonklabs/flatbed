services:
  app:
    build:
      # Repo root, so the ../../crates/flatbed path dependency resolves.
      context: ../..
      dockerfile: examples/telemetry/Dockerfile
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      app:
        condition: service_healthy
